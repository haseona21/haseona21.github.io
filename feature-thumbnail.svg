    <rect x="7" y="3" width="1" height="3" fill="#C96B1A"/>
    <rect x="9" y="3" width="1" height="3" fill="#C96B1A"/>
    <rect x="0" y="6" width="4" height="2" fill="#F4922A"/>
    <rect x="6" y="6" width="4" height="2" fill="#F4922A"/>
    <rect x="12" y="6" width="3" height="2" fill="#F4922A"/>
    <rect x="4" y="6" width="2" height="2" fill="#2D1F14"/>
    <rect x="10" y="6" width="2" height="2" fill="#2D1F14"/>
    <rect x="0" y="8" width="15" height="1" fill="#F4922A"/>
