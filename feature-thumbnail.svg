<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Feature Thumbnail</title>
  <desc id="desc">Thumbnail using the site palette and pixel cat icon.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F4F0" />
      <stop offset="100%" stop-color="#EDE9E3" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1A1714" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect x="60" y="60" width="1080" height="510" rx="26" fill="#F7F4F0" stroke="#DDD8D0" filter="url(#softShadow)" />

  <circle cx="1045" cy="155" r="72" fill="#C4836A" opacity="0.16" />
  <circle cx="160" cy="500" r="92" fill="#C4836A" opacity="0.12" />

  <g transform="translate(130,130) scale(12)" shape-rendering="crispEdges">
    <rect x="1" y="1" width="2" height="1" fill="#F4922A"/>
