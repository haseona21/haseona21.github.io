<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Left ear -->
  <rect x="1" y="1" width="2" height="1" fill="#F4922A"/>
  <rect x="1" y="2" width="3" height="1" fill="#F4922A"/>
  <!-- Right ear -->
  <rect x="12" y="1" width="2" height="1" fill="#F4922A"/>
  <rect x="11" y="2" width="3" height="1" fill="#F4922A"/>
  <!-- Head top -->
  <rect x="1" y="3" width="13" height="1" fill="#F4922A"/>
  <!-- Head rows 4-5 -->
  <rect x="0" y="4" width="15" height="2" fill="#F4922A"/>
  <!-- Tabby forehead stripes -->
  <rect x="5" y="3" width="1" height="3" fill="#C96B1A"/>
  <rect x="7" y="3" width="1" height="3" fill="#C96B1A"/>
  <rect x="9" y="3" width="1" height="3" fill="#C96B1A"/>
  <!-- Head rows 6-7 around eyes -->
  <rect x="0" y="6" width="4" height="2" fill="#F4922A"/>
  <rect x="6" y="6" width="4" height="2" fill="#F4922A"/>
  <rect x="12" y="6" width="3" height="2" fill="#F4922A"/>
  <!-- Eyes -->
  <rect x="4" y="6" width="2" height="2" fill="#2D1F14"/>
  <rect x="10" y="6" width="2" height="2" fill="#2D1F14"/>
  <!-- Head rows 8-10 -->
  <rect x="0" y="8" width="15" height="1" fill="#F4922A"/>
  <rect x="0" y="9" width="7" height="1" fill="#F4922A"/>
  <rect x="8" y="9" width="7" height="1" fill="#F4922A"/>
  <rect x="0" y="10" width="15" height="1" fill="#F4922A"/>
  <!-- Nose -->
  <rect x="7" y="9" width="1" height="1" fill="#E8617A"/>
  <!-- Head bottom -->
  <rect x="1" y="11" width="13" height="1" fill="#F4922A"/>
  <rect x="2" y="12" width="11" height="1" fill="#F4922A"/>
</svg>
